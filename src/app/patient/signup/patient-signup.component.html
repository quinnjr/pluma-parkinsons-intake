<div class="mx-auto max-w-md px-4 py-16">
  <div class="rounded-2xl border border-slate-200 bg-white p-8 shadow-sm">
    <h1 class="text-2xl font-bold text-slate-900">Create your account</h1>
    <p class="mt-1 text-sm text-slate-500">
      Sign up to complete the intake form and manage your records.
    </p>

    <form class="mt-6 space-y-4" (submit)="$event.preventDefault(); onSubmit()">
      <div>
        <label class="field-label" for="email">Email</label>
        <input id="email" type="email" autocomplete="email" required
               [ngModel]="email()" (ngModelChange)="email.set($event)" name="email" />
      </div>
      <div>
        <label class="field-label" for="password">Password <span class="text-slate-400">(min 12 chars)</span></label>
        <input id="password" type="password" autocomplete="new-password" required minlength="12"
               [ngModel]="password()" (ngModelChange)="password.set($event)" name="password" />
      </div>

      @if (errorMessage(); as msg) {
        <div class="rounded-lg border border-rose-300 bg-rose-50 p-3 text-sm text-rose-900">{{ msg }}</div>
      }

      <button type="submit" [disabled]="submitting() || !passwordValid()"
              class="w-full rounded-lg bg-brand-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-700 disabled:opacity-50">
        {{ submitting() ? 'Creating…' : 'Create account' }}
      </button>
    </form>

    <p class="mt-4 text-center text-sm text-slate-600">
      Already have an account? <a routerLink="/admin/login" class="font-medium text-brand-700 hover:underline">Sign in</a>
    </p>
  </div>
</div>
